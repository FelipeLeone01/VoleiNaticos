        .login-container {

        .login-left {

        .card {

            width: 100%;

            border: 1px solid #ccc;
        }


        .campo input:focus {
            outline: none;
            /* Remove borda padrão */

            /* Muda cor ao focar */
            box-shadow: 0 0 5px rgba(53, 83, 145, 0.5);
            /* Efeito de foco */
        }

<script>
    var tentativas = [];

    function entrar() { // Função chamada ao clicar em "Entrar"
        aguardar()  // Mostra loading



        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") { // Verifica campos vazios
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Preencha todos os campos)";
            finalizarAguardar(); // Esconde loading
            return false; // Interrompe execução
        }
        else {
            setTimeout(sumirMensagem, 5000) // Esconde mensagem após 5 segundos
        }

        tentativas.push(emailVar);

        var totalTentativas = 0;

        for (var i = 0; i < tentativas.length; i++) {
            totalTentativas++; // operação matemática
        }

        if (totalTentativas > 3) {
            var tempo = totalTentativas * 2; // operação matemática

            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "(Muitas tentativas! Aguarde " + tempo + " segundos)";

            setTimeout(() => {
                sumirMensagem();
            }, tempo * 1000);
            finalizarAguardar();
            return;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", { // Envia dados para o servidor
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) { // Se o login deu certo
                console.log(resposta);

                resposta.json().then(json => {
                    console.log("JSON COMPLETO:", json);
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email; // Salva email na sessão
                    sessionStorage.NOME_USUARIO = json.nome; // Salva nome
                    sessionStorage.ID_USUARIO = json.id_usuario; // Salva ID


                    setTimeout(function () {
                        window.location = "./index.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto); // Mostra erro
                });
            }

        }).catch(function (erro) {
            console.log(erro); // Mostra erro no console
        })

        return false; // Evita recarregar página
    }

    function sumirMensagem() { // Esconde mensagem de erro
        cardErro.style.display = "none"
    }
</script>
