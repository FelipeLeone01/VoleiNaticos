<script>
   function cadastrar() {

    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var cpfVar = cpf_input.value;

    var dominiosPermitidos = ["gmail.com", "hotmail.com", "outlook.com"];

    // VALIDAR DOMÍNIO
    function validarDominio(email) {
        var dominio = "";
        var achouArroba = false;

        for (var i = 0; i < email.length; i++) {
            if (email[i] == "@") {
                achouArroba = true;
            } else if (achouArroba) {
                dominio += email[i];
            }
        }

        for (var j = 0; j < dominiosPermitidos.length; j++) {
            if (dominio == dominiosPermitidos[j]) {
                return true;
            }
        }

        return false;
    }

    // FORÇA DA SENHA (SEM includes/match)
    function calcularForcaSenha(senha) {
        var forca = 0;

        forca += senha.length;

        for (var i = 0; i < senha.length; i++) {
            var letra = senha[i];

            if (letra == "@" || letra == "#") {
                forca += 5;
            }

            if (letra >= "A" && letra <= "Z") {
                forca += 5;
            }
        }

        return forca;
    }

    // CPF
    function validarCPF(cpf) {
        var soma = 0;

        for (var i = 0; i < cpf.length; i++) {
            soma += Number(cpf[i]);
        }

        return soma > 10;
    }

    // VALIDAÇÕES BÁSICAS
    if (nomeVar == "" || emailVar == "" || senhaVar == "" || confirmacaoSenhaVar == "" || cpfVar == "") {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Preencha todos os campos)";
        return;
    }

    if (!(nomeVar.length > 1)) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Nome inválido)";
        return;
    }

    // VALIDAR EMAIL SEM includes
    var temArroba = false;
    var temPonto = false;

    for (var i = 0; i < emailVar.length; i++) {
        if (emailVar[i] == "@") temArroba = true;
        if (emailVar[i] == ".") temPonto = true;
    }

    if (!(temArroba && temPonto)) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Email inválido)";
        return;
    }

    if (!(senhaVar.length > 6)) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Senha inválida)";
        return;
    }

    if (senhaVar != confirmacaoSenhaVar) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Senhas diferentes)";
        return;
    }

    if (!(cpfVar.length == 11)) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(CPF inválido)";
        return;
    }

    // VALIDAÇÕES AVANÇADAS
    if (!validarDominio(emailVar)) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Use gmail, hotmail ou outlook)";
        return;
    }

    var forcaSenha = calcularForcaSenha(senhaVar);

    if (forcaSenha < 10) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Senha fraca)";
        return;
    }

    if (!validarCPF(cpfVar)) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(CPF inválido)";
        return;
    }

    // FETCH (igual você já tinha)
    fetch("/usuarios/cadastrar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({
            nomeServer: nomeVar,
            emailServer: emailVar,
            senhaServer: senhaVar,
            cpfServer: cpfVar
        }),
    })
    .then(function (resposta) {
        if (resposta.ok) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Cadastro realizado!";

            setTimeout(() => {
                window.location = "login.html";
            }, 2000);
        }
    })
    .catch(function (erro) {
        console.log(erro);
    });

    return false;
}
function sumirMensagem() {
    cardErro.style.display = "none"; // Esconde a mensagem de erro
  }

</script>
